version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: agent_api
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: agent_worker
    env_file:
      - .env.example
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  db:
    image: postgres:16
    container_name: agent_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentdb
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: agent_redis
    ports:
      - "6379:6379"
